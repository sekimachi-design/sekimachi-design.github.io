<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apps — Sekimachi Design Studio</title>
  <link rel="icon" type="image/x-icon" href="../favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #fafafa;
      color: #111;
      min-height: 100vh;
      padding: 60px 24px;
    }
    header {
      max-width: 800px;
      margin: 0 auto 48px;
    }
    header a {
      display: inline-block;
      margin-bottom: 32px;
    }
    header img {
      height: 36px;
    }
    h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .grid {
      max-width: 800px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }
    .card {
      display: block;
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 28px 24px;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .card:hover {
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      transform: translateY(-2px);
    }
    .card-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .card-sub {
      font-size: 13px;
      color: #888;
    }
    .arrow {
      margin-top: 20px;
      font-size: 18px;
      color: #c8e020;
    }
  </style>
</head>
<body>
  <header>
    <a href="../index.html">
      <img src="https://sekimachi-design.com/portfolio/images/logo.png" alt="Sekimachi Design Studio">
    </a>
    <h1>Apps</h1>
  </header>

  <div class="grid">
    <a class="card" href="oyasumin/">
      <div class="card-title">おやすみん</div>
      <div class="card-sub">睡眠サポートアプリ</div>
      <div class="arrow">→</div>
    </a>
    <a class="card" href="japan-visit-map/">
      <div class="card-title">都道府県訪問マップ</div>
      <div class="card-sub">訪れた都道府県を記録</div>
      <div class="arrow">→</div>
    </a>
<a class="card" href="worldcup2026/">
      <div class="card-title">SAMURAI BLUE 2026</div>
      <div class="card-sub">ワールドカップ2026</div>
      <div class="arrow">→</div>
    </a>
    <a class="card" href="eiken5/">
      <div class="card-title">英検モンスターズ</div>
      <div class="card-sub">英検5級をめざせ！</div>
      <div class="arrow">→</div>
    </a>
  </div>
</body>
</html>
