<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>じゅんたろうNASAへの道</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
  background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
  min-height: 100vh; min-height: 100dvh;
  display: flex; justify-content: center;
}
.app {
  width: 95%; max-width: 540px;
  display: flex; flex-direction: column;
  padding: 6px 0 10px; gap: 5px;
}
h1 { text-align: center; color: white; font-size: 16px; text-shadow: 0 2px 8px rgba(0,0,0,0.3); }
.panel {
  background: rgba(255,255,255,0.95); border-radius: 12px;
  padding: 6px 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}
.btn-row { display: flex; gap: 4px; justify-content: center; flex-wrap: wrap; }
.lv-btn {
  padding: 5px 12px; border: 2px solid #ddd; border-radius: 8px;
  background: white; font-size: 12px; font-weight: bold;
  cursor: pointer; transition: all 0.15s;
}
.lv-btn.active { border-color: #302b63; background: #e8e4ff; color: #302b63; }

.progress-row { display: flex; justify-content: space-between; align-items: center; padding: 2px 8px; }
.progress-text { font-size: 12px; color: #666; font-weight: bold; }
.score-display { font-size: 16px; font-weight: bold; color: #302b63; transition: transform 0.3s; }
.score-display.pulse { animation: pulse-anim 0.4s ease-out; }
@keyframes pulse-anim {
  0% { transform: scale(1); }
  50% { transform: scale(1.5); color: #22c55e; }
  100% { transform: scale(1); }
}
.progress-dots { display: flex; gap: 3px; justify-content: center; margin-top: 3px; }
.dot {
  width: 14px; height: 14px; border-radius: 50%;
  background: #e5e7eb; border: 2px solid #d1d5db;
  transition: all 0.3s; display: flex; align-items: center; justify-content: center;
  font-size: 8px;
}
.dot.current { border-color: #302b63; box-shadow: 0 0 8px rgba(48,43,99,0.5); background: #e8e4ff; }
.dot.correct { background: #22c55e; border-color: #16a34a; }
.dot.wrong { background: #ef4444; border-color: #dc2626; }

.hissan-area {
  display: flex; justify-content: center; align-items: center;
  min-height: 120px; padding: 4px 0;
}
.hissan-grid { display: inline-block; }
.h-row { display: flex; justify-content: center; }

.h-cell {
  position: relative;
  display: flex; align-items: center; justify-content: center;
  font-weight: bold; overflow: hidden;
  user-select: none; -webkit-user-select: none;
}
.h-cell.empty { background: transparent; border: none; }
.h-cell.op { background: transparent; border: none; color: #302b63; }
.mc-cell { background: #e8ecff; border: 1px solid #c0c8e8; color: #1a1a2e; }
.h-cell.fixed { background: #e8ecff; border: 1px solid #c0c8e8; color: #1a1a2e; }

.h-cell.answer { background: white; border: 1px solid #c0c8e8; cursor: pointer; }
.h-cell.answer canvas { display: block; touch-action: none; }
.h-line { height: 3px; background: #333; margin: 0 auto; }

.answer-choices {
  display: flex; gap: 8px; justify-content: center;
  margin-top: 6px; padding: 4px 0;
}
.ans-btn {
  flex: 1; max-width: 120px; padding: 10px 6px;
  font-size: 20px; font-weight: bold;
  border: 3px solid #c0c8e8; border-radius: 10px;
  background: white; color: #302b63; cursor: pointer;
  transition: all 0.15s;
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.ans-btn.selected { border-color: #3b82f6; background: #dbeafe; color: #1e40af; transform: scale(1.05); }
.ans-btn.is-correct { border-color: #22c55e; background: #dcfce7; color: #16a34a; }
.ans-btn.is-wrong { border-color: #ef4444; background: #fee2e2; color: #dc2626; }
.ans-btn:active { transform: scale(0.95); }

.feedback { text-align: center; font-size: 18px; font-weight: bold; min-height: 26px; line-height: 26px; }
.feedback.ok { color: #22c55e; }
.feedback.ng { color: #ef4444; }

.action-row { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }
.act-btn {
  padding: 8px 14px; font-size: 13px; font-weight: bold;
  color: white; border: none; border-radius: 8px;
  cursor: pointer; transition: transform 0.1s;
}
.act-btn:active { transform: scale(0.95); }
.act-btn.next { background: linear-gradient(135deg, #302b63, #24243e); }
.act-btn.check { background: linear-gradient(135deg, #f59e0b, #ef4444); }
.act-btn.clear { background: #aaa; }
.act-btn.erase { background: #e88; }


/* Celebration */
.celebrate-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(ellipse at center, #0a0a2e 0%, #000 100%);
  z-index: 1000; display: flex; flex-direction: column;
  align-items: center; justify-content: center; overflow: hidden; cursor: pointer;
}
.rocket { position: absolute; font-size: 80px; left: 50%; transform: translateX(-50%); animation: rocket-launch 2.5s ease-in forwards; }
@keyframes rocket-launch {
  0% { bottom: -100px; }
  40% { bottom: 30%; }
  100% { bottom: 120%; }
}
.rocket-trail {
  position: absolute; left: 50%; transform: translateX(-50%);
  width: 6px; border-radius: 3px;
  background: linear-gradient(to top, #ff6b35, #ffd700, transparent);
  animation: trail-fade 2.5s ease-in forwards;
}
@keyframes trail-fade {
  0% { bottom: -100px; height: 60px; opacity: 1; }
  40% { bottom: 25%; height: 120px; opacity: 0.8; }
  100% { bottom: 110%; height: 40px; opacity: 0; }
}
.confetti {
  position: absolute; border-radius: 2px;
  animation: confetti-fall linear forwards;
}
@keyframes confetti-fall {
  0% { top: -20px; opacity: 1; transform: rotate(0deg) scale(1); }
  100% { top: 110vh; opacity: 0.3; transform: rotate(1080deg) scale(0.5); }
}
.star-bg {
  position: absolute; color: white; opacity: 0;
  animation: star-twinkle 2s ease-in-out infinite;
}
@keyframes star-twinkle {
  0%, 100% { opacity: 0.2; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.3); }
}
.celebrate-msg {
  position: relative; z-index: 10; text-align: center;
  padding: 20px;
}
.celebrate-title {
  font-size: 48px; font-weight: bold; color: #ffd700;
  text-shadow: 0 0 30px rgba(255,215,0,0.6);
  animation: bounce-in 0.6s ease-out 1s both;
}
.celebrate-sub {
  font-size: 22px; color: #a5b4fc; margin-top: 12px;
  animation: bounce-in 0.6s ease-out 1.5s both;
}
.celebrate-reward {
  font-size: 26px; color: #4ade80; font-weight: bold; margin-top: 20px;
  background: rgba(255,255,255,0.1); padding: 14px 28px; border-radius: 14px;
  border: 2px solid rgba(74,222,128,0.3);
  animation: bounce-in 0.6s ease-out 2s both;
}
.celebrate-close {
  font-size: 14px; color: rgba(255,255,255,0.4); margin-top: 24px;
  animation: bounce-in 0.6s ease-out 2.5s both;
}
@keyframes bounce-in {
  0% { transform: scale(0) rotate(-10deg); opacity: 0; }
  60% { transform: scale(1.15) rotate(2deg); opacity: 1; }
  100% { transform: scale(1) rotate(0); opacity: 1; }
}

/* Results */
.results-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,20,0.92); z-index: 1000;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.results-box { text-align: center; }
.results-emoji { font-size: 80px; animation: bounce-in 0.5s ease-out both; }
.results-score { font-size: 64px; font-weight: bold; color: white; margin-top: 8px; animation: bounce-in 0.5s ease-out 0.3s both; }
.results-unit { font-size: 28px; color: #a5b4fc; }
.results-msg { font-size: 22px; color: #ccc; margin-top: 8px; animation: bounce-in 0.5s ease-out 0.6s both; }
.results-retry {
  margin-top: 28px; padding: 16px 36px; font-size: 20px; font-weight: bold;
  background: linear-gradient(135deg, #302b63, #24243e); color: white;
  border: none; border-radius: 14px; cursor: pointer;
  animation: bounce-in 0.5s ease-out 0.9s both;
}
.results-retry:active { transform: scale(0.95); }

.history-btn {
  padding: 5px 12px; border: 2px solid #ddd; border-radius: 8px;
  background: white; font-size: 12px; font-weight: bold;
  cursor: pointer; transition: all 0.15s; color: #302b63;
}
.history-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,20,0.92); z-index: 1000;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.history-box {
  background: rgba(255,255,255,0.95); border-radius: 16px; padding: 20px;
  width: 90%; max-width: 480px; max-height: 80vh; overflow-y: auto;
}
.history-title { font-size: 18px; font-weight: bold; color: #302b63; text-align: center; margin-bottom: 12px; }
.history-chart { width: 100%; height: 200px; position: relative; margin-bottom: 12px; }
.history-bar-row { display: flex; align-items: flex-end; gap: 3px; height: 160px; padding: 0 4px; border-bottom: 2px solid #ddd; }
.history-bar {
  flex: 1; min-width: 8px; max-width: 28px; border-radius: 4px 4px 0 0;
  transition: height 0.3s; position: relative;
}
.history-bar-label { position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%); font-size: 8px; color: #999; white-space: nowrap; }
.history-close {
  display: block; margin: 12px auto 0; padding: 10px 28px; font-size: 14px; font-weight: bold;
  background: linear-gradient(135deg, #302b63, #24243e); color: white;
  border: none; border-radius: 10px; cursor: pointer;
}
.gal-msg {
  text-align: center; font-size: 13px; color: #e879f9; font-weight: bold;
  margin-top: 4px; min-height: 20px;
}
</style>
</head>
<body>
<div class="app">
  <h1>🚀 じゅんたろうNASAへの道</h1>

  <div class="panel">
    <div class="btn-row" id="levelBar"></div>
    <div style="text-align:center;margin-top:4px"><button class="history-btn" onclick="showHistory()">📊 きろく</button></div>
    <div class="gal-msg" id="galMsg"></div>
  </div>

  <div class="panel">
    <div class="progress-row">
      <span class="progress-text" id="qProgress">問題 1/10</span>
      <span class="score-display" id="qScoreDisp">0点</span>
    </div>
    <div class="progress-dots" id="progressDots"></div>
  </div>

  <div class="panel">
    <div class="hissan-area" id="hissanArea"></div>
    <div class="answer-choices" id="answerChoices"></div>
    <div class="feedback" id="feedback"></div>
  </div>

  <div class="panel">
    <div class="action-row">
      <button class="act-btn erase" onclick="undoLast()">← 戻る</button>
      <button class="act-btn clear" onclick="clearAll()">全部消す</button>
      <button class="act-btn next" id="nextBtn" onclick="next()">次の問題</button>
    </div>
  </div>
</div>

<script>
const DPR = window.devicePixelRatio || 1;
let lvIdx = 0, pA, pB, pAns;
let qNum = 1, qScore = 0, checked = false;
let drawing = false, activeCanvas = null, lastX = 0, lastY = 0;
let drawnHistory = [];
let wrongProblems = [];
let retryMode = false, retryProblems = [], retryTotal = 0;

const goodMsg = ['まじ神ってる〜！🎉','それな！正解！⭐','やばっ天才すぎん？🌟','完ぺきすぎてウケる💯','ガチですごい！✨','推せる〜！🏆'];
const badMsg = ['おしいっ！次いこ！😣','ドンマイ〜まだいける💪','ぜんぜんOK！次で取り返そ🔥','惜しみ〜！切り替えてこ😊'];

const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

function playCorrectSound() {
  const ctx = getAudioCtx();
  const g = ctx.createGain();
  g.connect(ctx.destination);
  g.gain.setValueAtTime(0.3, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
  [523, 659, 784].forEach((freq, i) => {
    const o = ctx.createOscillator();
    o.type = 'sine';
    o.frequency.value = freq;
    o.connect(g);
    o.start(ctx.currentTime + i * 0.1);
    o.stop(ctx.currentTime + i * 0.1 + 0.2);
  });
}

function playWrongSound() {
  const ctx = getAudioCtx();
  const g = ctx.createGain();
  g.connect(ctx.destination);
  g.gain.setValueAtTime(0.3, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
  [300, 280].forEach((freq, i) => {
    const o = ctx.createOscillator();
    o.type = 'square';
    o.frequency.value = freq;
    o.connect(g);
    o.start(ctx.currentTime + i * 0.15);
    o.stop(ctx.currentTime + i * 0.15 + 0.15);
  });
}
const REWARDS = [10, 15, 20, 25, 30];
const Q_PER_LEVEL = 5;
const SCORE_PER_Q = 100 / Q_PER_LEVEL;

const LV = [
  { label: 'Lv.1', desc: '2けた×1けた', aMin: 11, aMax: 49, bMin: 2, bMax: 4 },
  { label: 'Lv.2', desc: '2けた×1けた', aMin: 11, aMax: 99, bMin: 2, bMax: 9 },
  { label: 'Lv.3', desc: '2けた×2けた', aMin: 11, aMax: 99, bMin: 11, bMax: 99 },
  { label: 'Lv.4', desc: '3けた×1けた', aMin: 101, aMax: 999, bMin: 2, bMax: 9 },
  { label: 'Lv.5', desc: '3けた×2けた', aMin: 101, aMax: 999, bMin: 11, bMax: 99 },
];

function rand(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
function pick(a) { return a[Math.floor(Math.random() * a.length)]; }

// ===== Problem =====

function genProblem() {
  const lv = LV[lvIdx];
  pA = rand(lv.aMin, lv.aMax);
  pB = rand(lv.bMin, lv.bMax);
  pAns = pA * pB;
}

// ===== Answer Choices =====
function genAnswerChoices(correct) {
  const choices = new Set([correct]);
  const range = Math.max(5, Math.floor(correct * 0.2));
  while (choices.size < 3) {
    const offset = rand(1, range);
    const wrong = correct + (Math.random() < 0.5 ? offset : -offset);
    if (wrong > 0 && wrong !== correct) choices.add(wrong);
  }
  return [...choices].sort(() => Math.random() - 0.5);
}

function renderChoices() {
  const choices = genAnswerChoices(pAns);
  const el = document.getElementById('answerChoices');
  el.innerHTML = choices.map(v =>
    `<button class="ans-btn" data-val="${v}" onclick="selectAns(this)">${v}</button>`
  ).join('');
}

function selectAns(btn) {
  if (checked) return;
  document.querySelectorAll('.ans-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  check();
}

// ===== Grid =====
function cellSize(nc) {
  const w = document.getElementById('hissanArea').clientWidth;
  return Math.min(150, Math.floor((w - 10) / nc));
}

function emptyCell(sz) {
  return `<div class="h-cell empty" style="width:${sz}px;height:${sz}px"></div>`;
}

function render() {
  if (retryMode && retryProblems.length > 0) {
    const p = retryProblems[qNum - 1];
    pA = p.a; pB = p.b; pAns = p.ans;
  } else {
    genProblem();
  }
  checked = false; drawnHistory = [];
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  updateProgress();

  const isMul2 = String(pB).length >= 2;
  document.getElementById('hissanArea').innerHTML = '<div class="hissan-grid">' +
    (isMul2 ? renderMul2() : renderMul1()) + '</div>';

  renderChoices();

  document.getElementById('nextBtn').textContent = qNum >= getTotal() ? '結果を見る' : '次の問題';
  setupCanvases();
}

function renderMul1() {
  const aS = String(pA), bS = String(pB), anS = String(pAns);
  const maxD = Math.max(aS.length, bS.length, anS.length);
  const nc = maxD + 1;
  const sz = cellSize(nc);
  let h = '';

  h += '<div class="h-row">';
  const aOff = nc - aS.length;
  for (let c = 0; c < nc; c++) {
    if (c >= aOff) h += `<div class="h-cell mc-cell" style="width:${sz}px;height:${sz}px;font-size:${sz * 0.55}px">${aS[c - aOff]}</div>`;
    else h += emptyCell(sz);
  }
  h += '</div>';

  h += '<div class="h-row">';
  const bOff = nc - bS.length;
  for (let c = 0; c < nc; c++) {
    if (c === 0) h += `<div class="h-cell op" style="width:${sz}px;height:${sz}px;font-size:${sz * 0.5}px">×</div>`;
    else if (c >= bOff) h += `<div class="h-cell fixed" style="width:${sz}px;height:${sz}px;font-size:${sz * 0.55}px">${bS[c - bOff]}</div>`;
    else h += emptyCell(sz);
  }
  h += '</div>';

  h += `<div class="h-line" style="width:${nc * sz}px"></div>`;

  h += '<div class="h-row">';
  const anOff = nc - anS.length;
  for (let c = 0; c < nc; c++) {
    if (c >= anOff) h += makeAnswerCell(sz, 'a' + c);
    else h += emptyCell(sz);
  }
  h += '</div>';
  return h;
}

function renderMul2() {
  const aS = String(pA), bS = String(pB), anS = String(pAns);
  const b1 = parseInt(bS[1]), b0 = parseInt(bS[0]);
  const p1 = pA * b1, p2 = pA * b0;
  const p1S = String(p1), p2S = String(p2);
  const maxD = Math.max(aS.length, bS.length, anS.length, p1S.length, p2S.length + 1);
  const nc = maxD + 1;
  const sz = cellSize(nc);
  let h = '';

  h += '<div class="h-row">';
  const aOff = nc - aS.length;
  for (let c = 0; c < nc; c++) {
    if (c >= aOff) h += `<div class="h-cell mc-cell" style="width:${sz}px;height:${sz}px;font-size:${sz * 0.55}px">${aS[c - aOff]}</div>`;
    else h += emptyCell(sz);
  }
  h += '</div>';

  h += '<div class="h-row">';
  const bOff = nc - bS.length;
  for (let c = 0; c < nc; c++) {
    if (c === 0) h += `<div class="h-cell op" style="width:${sz}px;height:${sz}px;font-size:${sz * 0.5}px">×</div>`;
    else if (c >= bOff) h += `<div class="h-cell fixed" style="width:${sz}px;height:${sz}px;font-size:${sz * 0.55}px">${bS[c - bOff]}</div>`;
    else h += emptyCell(sz);
  }
  h += '</div>';

  h += `<div class="h-line" style="width:${nc * sz}px"></div>`;

  h += '<div class="h-row">';
  const p1Off = nc - p1S.length;
  for (let c = 0; c < nc; c++) {
    if (c >= p1Off) h += makeAnswerCell(sz, 'p1-' + c);
    else h += emptyCell(sz);
  }
  h += '</div>';

  h += '<div class="h-row">';
  const p2Off = nc - p2S.length - 1;
  for (let c = 0; c < nc; c++) {
    if (c >= p2Off && c < p2Off + p2S.length) h += makeAnswerCell(sz, 'p2-' + c);
    else h += emptyCell(sz);
  }
  h += '</div>';

  h += `<div class="h-line" style="width:${nc * sz}px;height:2px;background:#999"></div>`;

  h += '<div class="h-row">';
  const anOff = nc - anS.length;
  for (let c = 0; c < nc; c++) {
    if (c >= anOff) h += makeAnswerCell(sz, 'a' + c);
    else h += emptyCell(sz);
  }
  h += '</div>';
  return h;
}

function makeAnswerCell(sz, id) {
  const cw = sz * DPR, ch = sz * DPR;
  return `<div class="h-cell answer" style="width:${sz}px;height:${sz}px" data-id="${id}">` +
    `<canvas class="cell-canvas" data-cell-id="${id}" width="${cw}" height="${ch}" style="width:${sz}px;height:${sz}px"></canvas></div>`;
}

// ===== Drawing =====
function setupCanvases() {
  document.querySelectorAll('.cell-canvas').forEach(c => {
    const ctx = c.getContext('2d');
    ctx.scale(DPR, DPR);
    c.addEventListener('pointerdown', onDown);
    c.addEventListener('pointermove', onMove);
    c.addEventListener('pointerup', onUp);
    c.addEventListener('pointercancel', onUp);
  });
}

function onDown(e) {
  e.preventDefault();
  if (checked) return;
  const c = e.target;
  c.setPointerCapture(e.pointerId);
  drawing = true; activeCanvas = c;
  const cid = c.dataset.cellId;
  if (drawnHistory[drawnHistory.length - 1] !== cid) drawnHistory.push(cid);
  const r = c.getBoundingClientRect();
  lastX = e.clientX - r.left; lastY = e.clientY - r.top;
  const ctx = c.getContext('2d');
  ctx.strokeStyle = '#333'; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  const p = e.pressure > 0 ? e.pressure : 0.5;
  ctx.lineWidth = 1.5 + p * 3;
  ctx.beginPath(); ctx.moveTo(lastX, lastY);
}

function onMove(e) {
  if (!drawing || e.target !== activeCanvas) return;
  e.preventDefault();
  const r = activeCanvas.getBoundingClientRect();
  const x = Math.max(0, Math.min(e.clientX - r.left, r.width));
  const y = Math.max(0, Math.min(e.clientY - r.top, r.height));
  const ctx = activeCanvas.getContext('2d');
  const p = e.pressure > 0 ? e.pressure : 0.5;
  ctx.lineWidth = 1.5 + p * 3;
  ctx.lineTo(x, y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x, y);
  lastX = x; lastY = y;
}

function onUp() {
  if (!drawing) return;
  drawing = false;
  if (activeCanvas) activeCanvas.getContext('2d').beginPath();
  activeCanvas = null;
}

// ===== Actions =====
function clearCanvasById(id) {
  const c = document.querySelector(`canvas[data-cell-id="${id}"]`);
  if (!c) return;
  const ctx = c.getContext('2d');
  ctx.save(); ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, c.width, c.height); ctx.restore();
}

function undoLast() {
  if (drawnHistory.length === 0) return;
  const id = drawnHistory.pop();
  clearCanvasById(id);
}

function clearAll() {
  document.querySelectorAll('.cell-canvas').forEach(c => {
    const ctx = c.getContext('2d'); ctx.save(); ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, c.width, c.height); ctx.restore();
  });
  document.querySelectorAll('.ans-btn').forEach(b => {
    b.classList.remove('selected', 'is-correct', 'is-wrong');
  });
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  drawnHistory = [];
}

function check() {
  if (checked) return;
  const selected = document.querySelector('.ans-btn.selected');
  if (!selected) {
    const fb = document.getElementById('feedback');
    fb.textContent = '答えを選んでね！';
    fb.className = 'feedback ng';
    return;
  }

  checked = true;
  const picked = parseInt(selected.dataset.val);
  const isCorrect = picked === pAns;

  document.querySelectorAll('.ans-btn').forEach(btn => {
    btn.classList.remove('selected');
    if (parseInt(btn.dataset.val) === pAns) btn.classList.add('is-correct');
    else if (btn === selected) btn.classList.add('is-wrong');
  });

  const fb = document.getElementById('feedback');
  if (isCorrect) {
    qScore += SCORE_PER_Q;
    fb.textContent = pick(goodMsg); fb.className = 'feedback ok';
    const el = document.getElementById('qScoreDisp');
    el.classList.remove('pulse'); void el.offsetWidth; el.classList.add('pulse');
    playCorrectSound();
  } else {
    fb.textContent = pick(badMsg) + ` 答えは ${pAns} だよ`; fb.className = 'feedback ng';
    wrongProblems.push({ a: pA, b: pB, ans: pAns });
    playWrongSound();
  }
  const dot = document.querySelectorAll('.dot')[qNum - 1];
  if (dot) { dot.classList.remove('current'); dot.classList.add(isCorrect ? 'correct' : 'wrong'); }
  updateProgress();
  document.getElementById('nextBtn').textContent = qNum >= getTotal() ? '結果を見る' : '次の問題';

  setTimeout(() => next(), 3000);
}

function next() {
  if (!checked) return;
  if (qNum >= getTotal()) { showResults(); return; }
  qNum++;
  render();
}

// ===== Progress =====
function getTotal() { return retryMode ? retryTotal : Q_PER_LEVEL; }

function updateProgress() {
  const total = getTotal();
  document.getElementById('qProgress').textContent = retryMode ? `やり直し ${qNum}/${total}` : `問題 ${qNum}/${total}`;
  document.getElementById('qScoreDisp').textContent = `${qScore}点`;
}

function renderDots() {
  const total = getTotal();
  let h = '';
  for (let i = 0; i < total; i++) {
    h += `<div class="dot${i === qNum - 1 ? ' current' : ''}">${i + 1}</div>`;
  }
  document.getElementById('progressDots').innerHTML = h;
}

// ===== Results =====
function showResults() {
  if (!retryMode) saveResult(lvIdx, qScore);
  if (qScore === 100) celebrate();
  else showScoreScreen();
}

function showScoreScreen() {
  let emoji, msg;
  if (qScore >= 80) { emoji = '🛸'; msg = 'うちゅうまであとすこし！'; }
  else if (qScore >= 60) { emoji = '☁️'; msg = 'くもの上まできた！'; }
  else if (qScore >= 40) { emoji = '✈️'; msg = 'ひこうきの高さ！'; }
  else { emoji = '🚀'; msg = 'はっしゃだいにスタンバイ！'; }

  const ov = document.createElement('div');
  ov.className = 'results-overlay';
  const retryWrongBtn = wrongProblems.length > 0
    ? `<button class="results-retry" style="margin-top:12px;background:linear-gradient(135deg,#ef4444,#dc2626)" onclick="this.closest('.results-overlay').remove();startRetry()">まちがえた ${wrongProblems.length}問 をやり直す</button>`
    : '';
  ov.innerHTML = `<div class="results-box">
    <div class="results-emoji">${emoji}</div>
    <div class="results-score">${qScore}<span class="results-unit">点</span></div>
    <div class="results-msg">${msg}</div>
    <button class="results-retry" onclick="this.closest('.results-overlay').remove();setLv(lvIdx)">もう一度チャレンジ！</button>
    ${retryWrongBtn}
  </div>`;
  document.body.appendChild(ov);
}

function celebrate() {
  const ov = document.createElement('div');
  ov.className = 'celebrate-overlay';
  ov.onclick = () => ov.remove();

  for (let i = 0; i < 25; i++) {
    const s = document.createElement('div');
    s.className = 'star-bg';
    s.textContent = '✦';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.fontSize = (10 + Math.random() * 18) + 'px';
    s.style.animationDelay = Math.random() * 3 + 's';
    ov.appendChild(s);
  }

  for (let i = 0; i < 50; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + '%';
    c.style.animationDelay = (0.5 + Math.random() * 2.5) + 's';
    c.style.animationDuration = (2 + Math.random() * 3) + 's';
    c.style.background = ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#ff6fff', '#ff9f43'][i % 6];
    c.style.width = (6 + Math.random() * 10) + 'px';
    c.style.height = (6 + Math.random() * 10) + 'px';
    c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    ov.appendChild(c);
  }

  const r = document.createElement('div');
  r.className = 'rocket';
  r.textContent = '🚀';
  ov.appendChild(r);

  const trail = document.createElement('div');
  trail.className = 'rocket-trail';
  ov.appendChild(trail);

  const m = document.createElement('div');
  m.className = 'celebrate-msg';
  m.innerHTML = `
    <div class="celebrate-title">100点！🎉</div>
    <div class="celebrate-sub">NASAにいっぽ ちかづいた！</div>
    <div class="celebrate-reward">🎮 ${REWARDS[lvIdx]}ふん ゲームけん ゲット！</div>
    <div class="celebrate-close">タップして閉じる</div>
  `;
  ov.appendChild(m);
  document.body.appendChild(ov);
  setTimeout(() => { if (ov.parentNode) ov.remove(); }, 10000);
}

// ===== UI =====
function renderLevels() {
  document.getElementById('levelBar').innerHTML = LV.map((l, i) =>
    `<button class="lv-btn${i === lvIdx ? ' active' : ''}" onclick="setLv(${i})">${l.label}</button>`
  ).join('');
}

function setLv(i) {
  lvIdx = i; qNum = 1; qScore = 0;
  retryMode = false; retryProblems = []; retryTotal = 0; wrongProblems = [];
  document.querySelectorAll('.lv-btn').forEach((b, j) => b.classList.toggle('active', j === i));
  renderDots();
  render();
  showGalMsg();
}

function startRetry() {
  retryMode = true;
  retryProblems = wrongProblems.slice();
  retryTotal = retryProblems.length;
  wrongProblems = [];
  qNum = 1; qScore = 0;
  renderDots();
  render();
}

// ===== History =====
const HISTORY_KEY = 'juntaro-keisan-history';

function loadHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
  catch { return []; }
}

function saveResult(level, score) {
  const history = loadHistory();
  history.push({ lv: level, score, date: new Date().toISOString() });
  if (history.length > 200) history.splice(0, history.length - 200);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
}

function showHistory() {
  const history = loadHistory();
  const lvHistory = history.filter(h => h.lv === lvIdx);
  const last20 = lvHistory.slice(-20);

  const ov = document.createElement('div');
  ov.className = 'history-overlay';
  ov.onclick = e => { if (e.target === ov) ov.remove(); };

  let barsHtml = '';
  if (last20.length === 0) {
    barsHtml = '<div style="text-align:center;color:#999;padding:40px 0">まだきろくがないよ！</div>';
  } else {
    barsHtml = '<div class="history-bar-row">';
    last20.forEach((h, i) => {
      const pct = h.score;
      const color = pct === 100 ? '#22c55e' : pct >= 60 ? '#3b82f6' : '#ef4444';
      const d = new Date(h.date);
      const label = `${d.getMonth() + 1}/${d.getDate()}`;
      barsHtml += `<div class="history-bar" style="height:${Math.max(4, pct * 1.5)}px;background:${color}"><span class="history-bar-label">${label}</span></div>`;
    });
    barsHtml += '</div>';
  }

  const avg = last20.length > 0 ? Math.round(last20.reduce((s, h) => s + h.score, 0) / last20.length) : 0;
  const best = last20.length > 0 ? Math.max(...last20.map(h => h.score)) : 0;
  const count100 = last20.filter(h => h.score === 100).length;

  ov.innerHTML = `<div class="history-box">
    <div class="history-title">📊 Lv.${lvIdx + 1} のきろく</div>
    <div class="history-chart">${barsHtml}</div>
    <div style="display:flex;justify-content:space-around;margin:12px 0;font-size:13px;font-weight:bold;color:#302b63">
      <span>平均 ${avg}点</span><span>最高 ${best}点</span><span>💯×${count100}回</span>
    </div>
    <div style="text-align:center;font-size:12px;color:#999">全${lvHistory.length}回中 最新${last20.length}回を表示</div>
    <button class="history-close" onclick="this.closest('.history-overlay').remove()">とじる</button>
  </div>`;
  document.body.appendChild(ov);
}

// ===== Gal Messages =====
const galStart = [
  'よっしゃ〜今日もぶちかまそ！🔥',
  'きょうのじゅんたろう、ガチで期待してる〜！✨',
  'やるっしょ！いっちゃお〜💪',
  'テンアゲで行くよ〜！🎵',
  'じゅんたろうならイケる！まじ推し！💖',
];

function showGalMsg() {
  const el = document.getElementById('galMsg');
  if (el) el.textContent = pick(galStart);
}

// ===== Init =====
renderLevels();
renderDots();
render();
showGalMsg();
</script>
